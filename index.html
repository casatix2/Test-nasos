    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register("data:text/javascript;charset=utf-8," + encodeURIComponent(`
                const CACHE = 'nnts-cache';
                
                self.addEventListener('install', e => {
                    self.skipWaiting();
                });
                
                self.addEventListener('activate', e => {
                    self.clients.claim();
                });
                
                self.addEventListener('fetch', e => {
                    e.respondWith(
                        fetch(e.request)
                            .then(response => {
                                const clone = response.clone();
                                caches.open(CACHE).then(cache => cache.put(e.request, clone));
                                return response;
                            })
                            .catch(() => caches.match(e.request))
                    );
                });
                
                self.addEventListener('message', e => {
                    if (e.data === 'clearCache') {
                        e.waitUntil(
                            caches.delete(CACHE).then(() => {
                                self.skipWaiting();
                            })
                        );
                    }
                });
            `));
        });
    }
    </script>

            --text-secondary: #a0a0b0;
            --success: #2ecc71;
            --warning: #3498db;
            --info: #3498db;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html {
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            position: relative;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 100px;
        }
        
        .header {
            text-align: center;
            padding: 24px 0 16px;
        }
        
        .logo { font-size: 42px; margin-bottom: 8px; }

        .subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
        
        .steps-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
            padding: 0 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .step-badge {
            background: var(--primary);
            color: var(--text-secondary);
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }
        
        .step-badge.active {
            background: var(--accent);
            color: #fff;
        }
        
        .step-badge.done {
            background: var(--success);
            color: #fff;
        }
        
        .step-arrow {
            color: var(--text-secondary);
            font-size: 10px;
        }
        
        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 24px 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            animation: fadeIn 0.3s ease;
        }
        
        .situation-badge {
            display: inline-block;
            background: rgba(52, 152, 219, 0.2);
            color: var(--info);
            font-size: 11px;
            padding: 6px 14px;
            border-radius: 20px;
            margin-bottom: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .step-number {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        .question-emoji { font-size: 48px; margin-bottom: 12px; }
        
        .question {
            font-size: 20px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 8px;
        }

            background: rgba(255,255,255,0.03);
            border-left: 3px solid var(--warning);
            padding: 12px 14px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 20px;
            font-size: 13px;
            line-height: 1.5;
            color: var(--text-secondary);
        }
        
        .answers {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px 20px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            color: #fff;
            font-family: inherit;
            letter-spacing: 0.3px;
            -webkit-appearance: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            line-height: 1.3;

            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;

            margin-bottom: 20px;
            font-weight: 500;

            padding: 16px;
            margin-bottom: 20px;

            margin-bottom: 8px;
            line-height: 1.5;
            color: var(--text-secondary);
            font-size: 14px;

            margin-bottom: 16px;

            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: none;
        }

            display: block;
            animation: slideUp 0.3s ease;
        }

            background: #e94560;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(233, 68, 96, 0.4);
            font-family: inherit;
            white-space: nowrap;
        }

        }

            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);

            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            z-index: 200;
            display: none;
            box-shadow: 0 4px 20px rgba(46, 204, 113, 0.4);
        }
        
        .update-status.show {
            display: block;
            animation: slideDown 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }
        
        @keyframes slideDown {
            from { transform: translateX(-50%) translateY(-100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

            .container {
                padding-bottom: max(100px, env(safe-area-inset-bottom) + 60px);
            }

                bottom: max(20px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>

        // ============================================
        // ЛОГИКА ПРИЛОЖЕНИЯ
        // ============================================
        
        let history = ['menu'];
        
        function renderStep(stepId) {
            const node = tree[stepId];
            const card = document.getElementById('mainCard');
            const indicator = document.getElementById('stepsIndicator');
            
            if (node.type === 'menu') {
                indicator.innerHTML = '';
            } else if (node.step) {
                const totalSteps = node.totalSteps || 1;
                let html = '';
                for (let i = 1; i <= totalSteps; i++) {
                    if (i < node.step) html += `<span class="step-badge done">Шаг ${i}</span>`;
                    else if (i === node.step) html += `<span class="step-badge active">Шаг ${i}</span>`;
                    else html += `<span class="step-badge">Шаг ${i}</span>`;
                    if (i < totalSteps) html += '<span class="step-arrow">→</span>';
                }
                indicator.innerHTML = html;
            } else if (node.solution) {
                indicator.innerHTML = '<span class="step-badge done">Решение</span>';
            }
            
            if (node.type === 'menu') {
                card.className = 'card';
                card.innerHTML = `
                    <div style="text-align:center;font-size:48px;margin-bottom:12px;">${node.emoji}</div>
                    <div class="question" style="text-align:center;margin-bottom:20px;">${node.title}</div>
                    <div class="answers">
                        ${node.items.map(item => `
                            <button class="btn btn-full btn-yes" onclick="goTo('${item.next}')">
                                ${item.text}
                            </button>
                        `).join('')}
                    </div>
                `;
                return;
            }
            
            let situationHTML = '';
            if (node.situation) {
                situationHTML = `<div class="situation-badge">${node.situation}</div>`;
            }
            
            if (node.solution) {
                let contactHTML = '';
                if (node.solution.contact) {
                    contactHTML = `
                        <div class="contact-info">
                            <div class="contact-label">КОНТАКТ</div>
                            <div class="contact-name">${node.solution.contact.person}</div>
                            <div style="font-size:12px;color:var(--text-secondary);">${node.solution.contact.name}</div>
                            <div class="contact-phone">${node.solution.contact.phone}</div>
                        </div>
                    `;
                }
                
                let stepsHTML = '';
                if (node.solution.steps.length > 0) {
                    stepsHTML = `
                        <div class="solution-steps">
                            <ol>
                                ${node.solution.steps.map(s => `<li>${s}</li>`).join('')}
                            </ol>
                        </div>
                    `;
                }
                
                card.className = 'card solution-card';
                card.innerHTML = `
                    ${situationHTML}
                    <div class="solution-label">Решение</div>
                    <div class="solution-emoji">${node.solution.emoji}</div>
                    <div class="solution-text">${node.solution.text}</div>
                    ${stepsHTML}
                    ${contactHTML}
                    <button class="btn btn-full btn-back" onclick="goBack()">← Назад</button>
                    <button class="btn btn-full btn-back" onclick="goToMenu()" style="margin-top:4px;">К списку ситуаций</button>
                `;
                return;
            }
            
            const answersHTML = node.answers.map(a => {
                let btnClass = 'btn-yes';
                if (a.type === 'no') { btnClass = 'btn-no'; }
                if (a.type === 'extra') { btnClass = 'btn-extra'; }
                
                let commentHTML = '';
                if (a.comment) {
                    commentHTML = `<div style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:4px;font-weight:400;">${a.comment}</div>`;
                }
                
                return `
                    <button class="btn btn-full ${btnClass}" onclick="goTo('${a.next}')">
                        <span style="flex:1;text-align:left;">
                            ${a.text}
                            ${commentHTML}
                        </span>
                    </button>
                `;
            }).join('');
            
            let commentHTML = '';
            if (node.comment) {
                commentHTML = `<div class="question-comment">${node.comment}</div>`;
            }
            
            card.className = 'card';
            card.innerHTML = `
                ${situationHTML}
                <div class="step-number">Шаг ${node.step} из ${node.totalSteps || 1}</div>
                <div class="question-emoji">${node.emoji}</div>
                <div class="question">${node.question}</div>
                ${commentHTML}
                <div class="answers">
                    ${answersHTML}
                    ${history.length > 1 ? `
                        <button class="btn btn-full btn-back" onclick="goBack()">← Назад</button>
                    ` : ''}
                    <button class="btn btn-full btn-back" onclick="goToMenu()">К списку ситуаций</button>
                </div>
            `;
            
            setTimeout(() => {
                card.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        }
        
        function goTo(stepId) {
            history.push(stepId);
            renderStep(stepId);
        }
        
        function goBack() {
            if (history.length > 1) {
                history.pop();
                renderStep(history[history.length - 1]);
            }
        }
        
        function goToMenu() {
            history = ['menu'];
            renderStep('menu');
        }
        
        // ============================================
        // АВТООБНОВЛЕНИЕ
        // ============================================
        
        const APP_VERSION = 3;
        
        let updateChecked = false;
        
        async function checkForUpdate() {
            if (updateChecked) return;
            updateChecked = true;
            
            try {
                const response = await fetch(window.location.href, { cache: 'no-store' });
                const newText = await response.text();
                
                const match = newText.match(/const APP_VERSION = (\d+)/);
                
                if (match) {
                    const serverVersion = parseInt(match[1]);
                    
                    if (serverVersion > APP_VERSION) {
                        document.getElementById('updateBar').classList.add('show');
                    }
                }
            } catch (e) {
                // Офлайн
            }
        }
        
        async function updateApp() {
            const statusEl = document.getElementById('updateStatus');
            const updateBar = document.getElementById('updateBar');
            
            updateBar.classList.remove('show');
            statusEl.textContent = 'Обновление...';
            statusEl.classList.add('show');
            
            try {
                const cacheNames = await caches.keys();
                await Promise.all(cacheNames.map(name => caches.delete(name)));
                
                if (navigator.serviceWorker.controller) {
                    navigator.serviceWorker.controller.postMessage('clearCache');
                }
                
                setTimeout(() => {
                    statusEl.textContent = 'Готово!';
                    setTimeout(() => {
                        window.location.reload(true);
                    }, 500);
                }, 800);
                
            } catch (e) {
                statusEl.textContent = 'Ошибка';
                setTimeout(() => statusEl.classList.remove('show'), 2000);
            }
        }
        
        window.addEventListener('load', () => {
            setTimeout(checkForUpdate, 2000);
        });
        
        document.addEventListener('DOMContentLoaded', () => {
            renderStep('menu');
        });
