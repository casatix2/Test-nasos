<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Помощник по бурению</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Бурение">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛏️</text></svg>">
    
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register("data:text/javascript;charset=utf-8," + encodeURIComponent(`
                const CACHE = 'drilling-v1';
                self.addEventListener('install', e => {
                    e.waitUntil(caches.open(CACHE).then(cache => cache.addAll(['/'])));
                    self.skipWaiting();
                });
                self.addEventListener('fetch', e => {
                    e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
                });
            `));
        });
    }
    </script>
    
    <style>
        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --primary: #0f3460;
            --accent: #e94560;
            --text: #eee;
            --text-secondary: #a0a0b0;
            --success: #2ecc71;
            --warning: #f39c12;
            --info: #3498db;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { height: 100%; overflow-x: hidden; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 40px;
            min-height: 100vh;
            min-height: -webkit-fill-available;
        }
        
        .header {
            text-align: center;
            padding: 24px 0 16px;
        }
        
        .logo { font-size: 42px; margin-bottom: 8px; }
        .title { font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
        .subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
        
        /* Индикатор шагов */
        .steps-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
            padding: 0 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .step-badge {
            background: var(--primary);
            color: var(--text-secondary);
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }
        
        .step-badge.active {
            background: var(--accent);
            color: #fff;
        }
        
        .step-badge.done {
            background: var(--success);
            color: #fff;
        }
        
        .step-arrow {
            color: var(--text-secondary);
            font-size: 10px;
        }
        
        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 24px 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            animation: fadeIn 0.3s ease;
        }
        
        .situation-badge {
            display: inline-block;
            background: rgba(52, 152, 219, 0.2);
            color: var(--info);
            font-size: 11px;
            padding: 6px 14px;
            border-radius: 20px;
            margin-bottom: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .step-number {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        .question-emoji { font-size: 48px; margin-bottom: 12px; }
        
        .question {
            font-size: 20px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 8px;
        }
        
        .question-comment {
            background: rgba(255,255,255,0.03);
            border-left: 3px solid var(--warning);
            padding: 12px 14px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 20px;
            font-size: 13px;
            line-height: 1.5;
            color: var(--text-secondary);
        }
        
        .answers {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px 20px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            color: #fff;
            font-family: inherit;
            letter-spacing: 0.3px;
            -webkit-appearance: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            line-height: 1.3;
        }
        
        .btn:active { transform: scale(0.97); }
        
        .btn-yes {
            background: var(--success);
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }
        
        .btn-no {
            background: var(--accent);
            box-shadow: 0 4px 15px rgba(233, 68, 96, 0.3);
        }
        
        .btn-extra {
            background: var(--warning);
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3);
        }
        
        .btn-back {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-secondary);
            font-weight: 500;
            margin-top: 6px;
            padding: 14px;
            font-size: 14px;
        }
        
        .btn-full { width: 100%; }
        
        /* Решение */
        .solution-card {
            background: linear-gradient(135deg, #16213e 0%, #1a2744 100%);
            border: 1px solid var(--success);
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.1);
        }
        
        .solution-label {
            display: inline-block;
            background: var(--success);
            color: #fff;
            font-size: 11px;
            padding: 5px 14px;
            border-radius: 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }
        
        .solution-emoji { font-size: 48px; margin-bottom: 12px; }
        
        .solution-text {
            font-size: 17px;
            line-height: 1.6;
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .solution-steps {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }
        
        .solution-steps ol { padding-left: 20px; }
        
        .solution-steps li {
            margin-bottom: 8px;
            line-height: 1.5;
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .contact-info {
            background: rgba(233, 68, 96, 0.1);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            text-align: center;
        }
        
        .contact-label { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .contact-phone { font-size: 20px; font-weight: 700; margin: 4px 0; }
        .contact-name { font-size: 13px; color: var(--text-secondary); }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @supports (padding: max(0px)) {
            .container {
                padding-bottom: max(40px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">⛏️</div>
            <div class="title">Помощник буровика</div>
            <div class="subtitle">Диагностика и решения</div>
        </div>
        
        <div class="steps-indicator" id="stepsIndicator"></div>
        <div class="card" id="mainCard"></div>
    </div>
    
    <script>
        // ============================================
        // ДЕРЕВО РЕШЕНИЙ — Низкий уровень подземных вод
        // ============================================
        const tree = {
            // Главное меню (потом добавим другие ситуации)
            menu: {
                type: 'menu',
                title: 'Выберите ситуацию',
                emoji: '📋',
                items: [
                    { text: '💧 Низкий уровень подземных вод', next: 'low_water_step1' },
                    // Здесь будут добавляться другие ситуации
                ]
            },
            
            // Шаг 1: Пакер
            low_water_step1: {
                situation: 'Низкий уровень подземных вод',
                step: 1,
                totalSteps: 3,
                emoji: '🔧',
                question: 'Установлен ли пакер?',
                comment: '',
                answers: [
                    { text: 'Да, установлен', next: 'low_water_step2', type: 'yes' },
                    { text: 'Нет, не установлен', next: 'low_water_step3', type: 'no' },
                    { 
                        text: 'Перед установкой — уровень ниже кровли интервала', 
                        next: 'low_water_step3', 
                        type: 'extra',
                        comment: 'Пакер не устанавливаем. Делаем опыт в интервале: Уровень воды-забой.'
                    },
                ]
            },
            
            // Шаг 2: Уровень ниже пакера?
            low_water_step2: {
                situation: 'Низкий уровень подземных вод',
                step: 2,
                totalSteps: 3,
                emoji: '📏',
                question: 'Уровень ниже пакера?',
                comment: 'Проверьте показания датчика уровня относительно положения пакера.',
                answers: [
                    { text: 'Да, уровень ниже', next: 'solution_packer_remove', type: 'yes' },
                    { text: 'Нет, не ниже', next: 'low_water_step3', type: 'no' },
                    { 
                        text: 'Уровень на уровне посадочного кольца (4-5 м над пакером)', 
                        next: 'low_water_step3', 
                        type: 'extra',
                        comment: 'Уровень высоко — переходим к проверке насоса.'
                    },
                ]
            },
            
            // Шаг 3: Насос
            low_water_step3: {
                situation: 'Низкий уровень подземных вод',
                step: 3,
                totalSteps: 3,
                emoji: '💧',
                question: 'Есть ли возможность спустить насос?',
                comment: 'Нужно загрузить насос под статический уровень минимум на 3-4 метра. Проверьте марку насоса и его характеристику — поднимет ли он воду с глубины загрузки. По опыту нашего оборудования максимальная глубина спуска насоса 150-160 м (Grundfos 1-155).',
                answers: [
                    { text: 'Да, можно спустить', next: 'solution_lower_pump', type: 'yes' },
                    { text: 'Нет, нельзя спустить', next: 'solution_lower_sensor', type: 'no' },
                ]
            },
            
            // === ФИНАЛЬНЫЕ РЕШЕНИЯ ===
            
            // Решение: Достаём пакер и проверяем датчик
            solution_packer_remove: {
                situation: 'Низкий уровень подземных вод',
                solution: {
                    emoji: '🔧',
                    text: 'Достаём пакер и проверяем датчик.',
                    steps: [
                        'Извлеките пакер из скважины.',
                        'Проверьте датчик уровня в пакере.',
                        'Если датчик показывает, что уровень БЫЛ — возвращаем пакер на место и делаем налив.',
                        'Если датчик СУХОЙ — устанавливаем пакер ниже на 5 м (ориентируйтесь по состоянию керна).',
                        'Повторяем процедуру до тех пор, пока не появится уровень.'
                    ],
                    contact: null
                }
            },
            
            // Решение: Спускаем насос, делаем прокачку
            solution_lower_pump: {
                situation: 'Низкий уровень подземных вод',
                solution: {
                    emoji: '💧',
                    text: 'Спускаем насос и делаем прокачку.',
                    steps: [
                        'Загрузите насос под статический уровень минимум на 3-4 метра.',
                        'Убедитесь, что насос способен поднять воду с данной глубины (макс. 150-160 м для Grundfos 1-155).',
                        'Запустите насос и выполните прокачку.',
                        'Контролируйте уровень воды в процессе откачки.'
                    ],
                    contact: null
                }
            },
            
            // Решение: Спускаем датчик и делаем налив
            solution_lower_sensor: {
                situation: 'Низкий уровень подземных вод',
                solution: {
                    emoji: '📊',
                    text: 'Спускаем датчик под уровень воды и делаем налив.',
                    steps: [
                        'Спустите датчик под уровень воды (желательно на 15-20 метров).',
                        'Если есть возможность — спустите ещё ниже.',
                        'Выполните налив или экспресс-налив.',
                        'Контролируйте восстановление уровня по датчику.'
                    ],
                    contact: null
                }
            }
        };
        
        // ============================================
        // ЛОГИКА ПРИЛОЖЕНИЯ
        // ============================================
        
        let history = ['menu'];
        
        function getStepsList(nodeId) {
            // Собирает цепочку шагов для отображения в индикаторе
            if (nodeId === 'menu') return [];
            const node = tree[nodeId];
            if (!node || !node.situation) return [];
            
            let steps = [];
            // Ищем все шаги этой ситуации
            Object.entries(tree).forEach(([key, value]) => {
                if (value.situation === node.situation && value.step) {
                    steps.push({ id: key, step: value.step, totalSteps: value.totalSteps });
                }
            });
            steps.sort((a, b) => a.step - b.step);
            return steps;
        }
        
        function renderStep(stepId) {
            const node = tree[stepId];
            const card = document.getElementById('mainCard');
            const indicator = document.getElementById('stepsIndicator');
            
            // Индикатор шагов
            if (node.type === 'menu') {
                indicator.innerHTML = '';
            } else if (node.step) {
                const totalSteps = node.totalSteps || 3;
                let html = '';
                for (let i = 1; i <= totalSteps; i++) {
                    if (i < node.step) html += `<span class="step-badge done">Шаг ${i}</span>`;
                    else if (i === node.step) html += `<span class="step-badge active">Шаг ${i}</span>`;
                    else html += `<span class="step-badge">Шаг ${i}</span>`;
                    if (i < totalSteps) html += '<span class="step-arrow">→</span>';
                }
                indicator.innerHTML = html;
            } else if (node.solution) {
                indicator.innerHTML = '<span class="step-badge done">Решение</span>';
            }
            
            // Меню
            if (node.type === 'menu') {
                card.className = 'card';
                card.innerHTML = `
                    <div style="text-align:center;font-size:48px;margin-bottom:12px;">${node.emoji}</div>
                    <div class="question" style="text-align:center;margin-bottom:20px;">${node.title}</div>
                    <div class="answers">
                        ${node.items.map(item => `
                            <button class="btn btn-full btn-yes" onclick="goTo('${item.next}')">
                                ${item.text}
                            </button>
                        `).join('')}
                    </div>
                `;
                return;
            }
            
            // Ситуация (шапка)
            let situationHTML = '';
            if (node.situation) {
                situationHTML = `<div class="situation-badge">📌 ${node.situation}</div>`;
            }
            
            // Решение
            if (node.solution) {
                let contactHTML = '';
                if (node.solution.contact) {
                    contactHTML = `
                        <div class="contact-info">
                            <div class="contact-label">${node.solution.contact.label}</div>
                            <div class="contact-phone">${node.solution.contact.phone}</div>
                            <div class="contact-name">${node.solution.contact.name}</div>
                        </div>
                    `;
                }
                
                card.className = 'card solution-card';
                card.innerHTML = `
                    ${situationHTML}
                    <div class="solution-label">Решение</div>
                    <div class="solution-emoji">${node.solution.emoji}</div>
                    <div class="solution-text">${node.solution.text}</div>
                    <div class="solution-steps">
                        <ol>
                            ${node.solution.steps.map(s => `<li>${s}</li>`).join('')}
                        </ol>
                    </div>
                    ${contactHTML}
                    <button class="btn btn-full btn-back" onclick="goBack()">⬅ Назад</button>
                    <button class="btn btn-full btn-back" onclick="goToMenu()" style="margin-top:4px;">📋 К списку ситуаций</button>
                `;
                return;
            }
            
            // Вопрос
            const answersHTML = node.answers.map(a => {
                let btnClass = 'btn-yes';
                let emoji = '✅';
                if (a.type === 'no') { btnClass = 'btn-no'; emoji = '❌'; }
                if (a.type === 'extra') { btnClass = 'btn-extra'; emoji = '⚠️'; }
                
                let commentHTML = '';
                if (a.comment) {
                    commentHTML = `<div style="font-size:12px;color:var(--text-secondary);margin-top:4px;font-weight:400;">${a.comment}</div>`;
                }
                
                return `
                    <button class="btn btn-full ${btnClass}" onclick="goTo('${a.next}')">
                        <span>${emoji}</span>
                        <span style="flex:1;text-align:left;">
                            ${a.text}
                            ${commentHTML}
                        </span>
                    </button>
                `;
            }).join('');
            
            let commentHTML = '';
            if (node.comment) {
                commentHTML = `<div class="question-comment">💡 ${node.comment}</div>`;
            }
            
            card.className = 'card';
            card.innerHTML = `
                ${situationHTML}
                <div class="step-number">Шаг ${node.step} из ${node.totalSteps || 3}</div>
                <div class="question-emoji">${node.emoji}</div>
                <div class="question">${node.question}</div>
                ${commentHTML}
                <div class="answers">
                    ${answersHTML}
                    ${history.length > 1 ? `
                        <button class="btn btn-full btn-back" onclick="goBack()">⬅ Назад</button>
                    ` : ''}
                    <button class="btn btn-full btn-back" onclick="goToMenu()">📋 К списку ситуаций</button>
                </div>
            `;
            
            setTimeout(() => {
                card.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        }
        
        function goTo(stepId) {
            history.push(stepId);
            renderStep(stepId);
        }
        
        function goBack() {
            if (history.length > 1) {
                history.pop();
                renderStep(history[history.length - 1]);
            }
        }
        
        function goToMenu() {
            history = ['menu'];
            renderStep('menu');
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            renderStep('menu');
        });
    </script>
</body>
</html>
